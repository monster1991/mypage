<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조성지 | Profile</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
* {
    font-family: "Pretendard", sans-serif;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* 컨테이너 */
.container {
    max-width: 420px;
    margin: auto;
    padding: 40px 20px;
}

/* 프로필 */
.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: auto;
    background-image: url('백마넥서스.PNG');
    background-size: cover;
    border: 3px solid rgba(255,255,255,0.2);
}

/* 텍스트 */
.name {
    text-align: center;
    font-size: 26px;
    margin-top: 20px;
    font-weight: bold;
}

.sub {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 20px;
}

/* 방문자 */
.counter {
    text-align: center;
    font-size: 12px;
    color: #64748b;
    margin-bottom: 30px;
}

/* 섹션 */
.section {
    margin-bottom: 30px;
}

/* 섹션 제목 */
.section-title {
    font-size: 14px;
    margin-bottom: 10px;
    color: #94a3b8;
}

/* 카드 */
.link {
    display: block;
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    text-decoration: none;
    color: white;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.08);
}

.link:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.1);
}

/* 강조 */
.highlight {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
}

/* 포트폴리오 카드 */
.portfolio {
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.05);
}

/* 애니메이션 */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="container">

    <!-- 프로필 -->
    <div class="profile fade"></div>
    <div class="name fade">조성지</div>
    <div class="sub fade">Infra · Cloud · Security · Automation</div>

    <!-- 방문자 카운터 -->
    <div class="counter fade">
        방문자 수: <span id="visitorCount">0</span>
    </div>

    <!-- WORK -->
    <div class="section fade">
        <div class="section-title">WORK</div>

        <a class="link highlight" href="http://itji.synology.me" target="_blank">
            🌐 My Lab
        </a>

        <a class="link" href="https://kmong.com/gig/503742" target="_blank">크몽</a>
    </div>

    <!-- SNS -->
    <div class="section fade">
        <div class="section-title">SNS</div>

        <a class="link" href="https://www.instagram.com/joesungji/" target="_blank">Instagram</a>
        <a class="link" href="https://www.facebook.com/joe.sungji/" target="_blank">Facebook</a>
        <a class="link" href="https://github.com/monster1991" target="_blank">Github</a>
        <a class="link" href="https://www.youtube.com/@josung" target="_blank">Youtube</a>
    </div>

    <!-- HOBBY -->
    <div class="section fade">
        <div class="section-title">HOBBY</div>

        <a class="link" href="https://op.gg/ko/lol/summoners/kr/%EA%B0%80%EB%A3%A8%EB%8B%A4%EC%A1%B0%EC%84%B1-KR1" target="_blank">League of Legends</a>
        <a class="link" href="https://www.inven.co.kr/member/inventory/view_inventory.php?nick=%EA%B0%80%EB%A3%A8%EB%8B%A4%EC%A1%B0%EC%84%B1" target="_blank">Inven</a>
        <a class="link" href="https://itji.kr:34443" target="_blank">데디케이트 서버 관리 패널</a>
    </div>

    <!-- PORTFOLIO -->
    <div class="section fade">
        <div class="section-title">PORTFOLIO</div>
    
        <a class="portfolio link" href="projects/zabbix.html">
            ✔ Zabbix 모니터링 시스템 구축
        </a>
    
        <a class="portfolio link" href="projects/wazuh.html">
            ✔ Wazuh + OpenVAS 연동
        </a>
    
        <a class="portfolio link" href="projects/fortigate.html">
            ✔ Fortigate 대규모 운영
        </a>
    </div>

</div>

<script>
/* 방문자 카운터 (간단 localStorage 기반) */
let count = localStorage.getItem('visitorCount');
if (!count) count = 0;
count++;
localStorage.setItem('visitorCount', count);
document.getElementById('visitorCount').innerText = count;

/* 애니메이션 (스크롤 등장) */
const elements = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('show');
        }
    });
});

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
